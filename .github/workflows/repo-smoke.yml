name: Repo Smoke

on:
  push:
  pull_request:
  workflow_dispatch:

concurrency:
  group: repo-smoke-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    # Keep the smoke job on a stable Windows image. In May 2026 GitHub began
    # redirecting windows-latest to the Windows 2025/VS 2026 image, which made
    # the Flutter host analyze step fail even though the same checkout passes
    # locally and on the established runner image.
    runs-on: windows-2022
    timeout-minutes: 45
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    defaults:
      run:
        shell: pwsh

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.9'
          channel: stable
          cache: true

      - name: Show toolchain versions
        run: |
          flutter --version
          dart --version

      - name: Delivery validation
        working-directory: .\packages\mini_program_tooling
        run: |
          dart run bin\validate_delivery.dart --repo-root ..\.. --output text

      - name: Backend pub get
        working-directory: .\backend\local_backend_service
        run: |
          dart pub get

      - name: Backend analyze
        working-directory: .\backend\local_backend_service
        run: |
          dart analyze

      - name: Backend test
        working-directory: .\backend\local_backend_service
        run: |
          dart test

      - name: SDK pub get
        working-directory: .\packages\mini_program_sdk
        run: |
          flutter pub get

      - name: SDK analyze
        working-directory: .\packages\mini_program_sdk
        run: |
          flutter analyze

      - name: SDK test
        working-directory: .\packages\mini_program_sdk
        run: |
          flutter test

      - name: Super host pub get
        working-directory: .\hosts\super_app_host
        run: |
          flutter pub get

      - name: Super host analyze
        working-directory: .\hosts\super_app_host
        run: |
          dart analyze

      - name: Super host test
        working-directory: .\hosts\super_app_host
        run: |
          flutter test

      - name: Partner host pub get
        working-directory: .\hosts\partner_app_host
        run: |
          flutter pub get

      - name: Partner host analyze
        working-directory: .\hosts\partner_app_host
        run: |
          dart analyze

      - name: Partner host test
        working-directory: .\hosts\partner_app_host
        run: |
          flutter test
