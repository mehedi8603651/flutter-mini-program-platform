name: stac_cli
description: A CLI tool for managing Stac SDUI (Server-Driven UI) projects and converting Dart to JSON.
version: 1.6.0
repository: https://github.com/StacDev/stac
homepage: https://stac.dev/

environment:
  sdk: ^3.8.1

# Add regular dependencies here.
dependencies:
  args: ^2.7.0
  dio: ^5.9.1
  yaml: ^3.1.3
  path: ^1.9.1
  interact: ^2.2.0
  stac_core: ^1.4.0
  json_annotation: ^4.11.0
  dotenv: ^4.2.0
  cryptography: ^2.9.0

# Executables that can be run globally
executables:
  stac: stac_cli

dev_dependencies:
  lints: ^6.1.0
  test: ^1.30.0
  build_runner: ^2.11.1
  json_serializable: ^6.13.0
  build_version: ^2.0.0

# stac_cli/pubspec_overrides.yaml
